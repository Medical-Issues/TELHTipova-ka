<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Registrace – Tipovačka</title>
    <link rel="stylesheet" href="/css/styles.css" />
    <link rel="icon" href="/images/logo.png">
</head>
<header class="header">
    <div class="logo_title"><img class="image_logo" src="/images/logo.png" alt="Logo"><h1 id="title">Tipovačka</h1></div>
</header>
<body class="login_body">
<h1>Registrace</h1>
<form class="login_form" method="POST" action="/auth/register">
    <input type="hidden" name="_csrf" id="csrfToken" value="">
    <label><input class="login_input" type="text" name="username" placeholder="Uživatelské jméno" required></label>
    <label><input class="login_input" type="password" name="password" placeholder="Heslo" required></label>
    <button class="login_button" type="submit">Registrovat</button>
</form>
<p id="error-msg">Uživatel už existuje.</p>
<a href="/auth/login">Už mám účet</a>

<script>
    const params = new URLSearchParams(window.location.search);
    if (params.get('error') === '1') {
        document.getElementById('error-msg').style.display = 'block';
    }
    
    // Fetch CSRF token from server
    fetch('/api/csrf-token')
        .then(res => res.json())
        .then(data => {
            const tokenInput = document.getElementById('csrfToken');
            if (tokenInput && data.csrfToken) {
                tokenInput.value = data.csrfToken;
            }
        })
        .catch(err => console.error('Failed to load CSRF token:', err));
</script>
</body>
</html>
